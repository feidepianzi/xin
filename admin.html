<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>后台管理</title>
    <style>
        body{font-family:Arial,sans-serif;max-width:600px;margin:50px auto;padding:20px;text-align:center}
        h1{color:#333;font-size:24px;margin-bottom:30px}
        .admin-buttons{display:flex;justify-content:center;gap:50px;margin:60px 0}
        .admin-btn{padding:18px 40px;font-size:20px;background:#007bff;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:bold;box-shadow:0 4px 8px rgba(0,0,0,0.2)}
        .admin-btn:hover{background:#0056b3;transform:translateY(-2px);box-shadow:0 6px 12px rgba(0,0,0,0.3)}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}
        .modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:8px;min-width:300px;max-width:90%}
        .modal h2{margin-top:0;font-size:18px}
        .modal textarea{width:100%;height:200px;margin:10px 0;padding:10px;font-size:14px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}
        .modal input[type=password]{padding:8px;font-size:14px;width:200px;margin:10px 0;box-sizing:border-box}
        .modal button{padding:8px 16px;font-size:14px;margin:5px;border:none;cursor:pointer;border-radius:4px}
        .modal .btn-save{background:#28a745;color:#fff}.modal .btn-cancel{background:#dc3545;color:#fff}
        .modal .btn-confirm{background:#007bff;color:#fff}.modal .btn-clear{background:#ffc107;color:#000}
        .error-msg{color:red;font-size:14px;margin-top:10px}
        @media(max-width:600px){body{margin:20px auto;padding:10px}.admin-buttons{flex-direction:column;gap:20px}.admin-btn{width:80%;margin:0 auto}.modal{min-width:280px;padding:20px}}
    </style>
</head>
<body>
    <div class="admin-buttons">
        <button class="admin-btn" onclick="showPasswordPrompt(1)">管理1</button>
        <button class="admin-btn" onclick="showPasswordPrompt(2)">管理2</button>
    </div>

    <div id="passwordModal" class="modal-overlay">
        <div class="modal">
            <h2 id="passwordTitle">请输入密码</h2>
            <input type="password" id="passwordInput" placeholder="密码" /><br/>
            <button class="btn-confirm" onclick="checkPassword()">确认</button>
            <button class="btn-cancel" onclick="hidePasswordPrompt()">取消</button>
            <div id="passwordError" class="error-msg"></div>
        </div>
    </div>

    <div id="updateModal" class="modal-overlay">
        <div class="modal">
            <h2 id="updateTitle">更新数组数据</h2>
            <p>请输入新的数组数据（每行一个编号，或用逗号分隔）：</p>
            <textarea id="arrayInput" placeholder=""></textarea><br/>
            <button class="btn-save" onclick="saveArray()">保存</button>
            <button class="btn-cancel" onclick="hideUpdateModal()">取消</button>
            <button class="btn-clear" onclick="clearCurrentArray()">一键清除</button>
            <div id="updateMsg" class="error-msg"></div>
        </div>
    </div>

    <script>var PASSWORD1 = String.fromCharCode(56,56,56,56,56,56,56,56);var PASSWORD2 = String.fromCharCode(54,54,54,54,54,54,54,54);var currentZone = 0;var dataObj ={frontend:[],backend1:[],backend2:[]};async function loadData(){try{var resp = await fetch("/api/data");if (resp.ok) dataObj = await resp.json();}catch(e){}}async function saveDataToStorage(){await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(dataObj)});}loadData();function showPasswordPrompt(zone){currentZone = zone;document.getElementById("passwordModal").style.display = "block";document.getElementById("passwordTitle").textContent = "Backend" + zone + " - 请输入密码";document.getElementById("passwordInput").value = "";document.getElementById("passwordError").textContent = "";document.getElementById("passwordInput").focus();}function hidePasswordPrompt(){document.getElementById("passwordModal").style.display = "none";}function checkPassword(){var inputPassword = document.getElementById("passwordInput").value;var correctPassword = currentZone === 1 ? PASSWORD1:PASSWORD2;if (inputPassword === correctPassword){hidePasswordPrompt();showUpdateModal();}else{document.getElementById("passwordError").textContent = "密码错误！";}}document.getElementById("passwordInput").addEventListener("keypress",function(e){if(e.key==="Enter")checkPassword();});function showUpdateModal(){document.getElementById("updateModal").style.display = "block";document.getElementById("updateTitle").textContent = "Backend" + currentZone + " - 追加数据";var arr = currentZone === 1 ? dataObj.backend1:dataObj.backend2;document.getElementById("arrayInput").value = (arr || []).join("\n");document.getElementById("updateMsg").textContent = "已有 " + (arr || []).length + " 条数据，在下面追加新数据";document.getElementById("updateMsg").style.color = "#666";}function hideUpdateModal(){document.getElementById("updateModal").style.display = "none";}async function clearCurrentArray(){if (!confirm("确定要清除当前数组吗？")) return;document.getElementById("arrayInput").value = "";if (currentZone === 1){dataObj.backend1 = [];}else{dataObj.backend2 = [];}await saveDataToStorage();document.getElementById("updateMsg").textContent = "已清除！";document.getElementById("updateMsg").style.color = "green";}function parseInput(input){if (!input.trim()) return [];var firstHouIdx = input.indexOf('\u539a');var result = [];var lines = input.split('\n');for (var li = 0;li < lines.length;li++){var tline = lines[li].trim();if (!tline) continue;var items = tline.split(/[、`、\u3002,\r]+/);for (var pi = 0;pi < items.length;pi++){var p = items[pi].trim();if (!p) continue;var nm = p.match(/^([0-9A-Za-z]+)/);if (!nm) continue;var firstNumIdx = input.indexOf(nm[1]);if (firstHouIdx >= 0 && firstNumIdx >= 0 && firstNumIdx < firstHouIdx){result.push(nm[1] + '-\u539a');}else{result.push(nm[1]);}}}var seen ={};var final = [];for (var ri = 0;ri < result.length;ri++){if (!seen[result[ri]]){seen[result[ri]] = true;final.push(result[ri]);}}return final;}async function saveArray(){var input = document.getElementById("arrayInput").value;var msgEl = document.getElementById("updateMsg");var existing = currentZone === 1 ? (dataObj.backend1 || []):(dataObj.backend2 || []);if (!input.trim()){if (currentZone === 1){dataObj.backend1 = [];}else{dataObj.backend2 = [];}await saveDataToStorage();msgEl.textContent = "已保存（空数组）";msgEl.style.color = "green";setTimeout(hideUpdateModal,1500);return;}var existingSet ={};for (var e = 0;e < existing.length;e++) existingSet[existing[e]] = true;var lines = input.split('\n');var newItems = [];for (var li = 0;li < lines.length;li++){var tline = lines[li].trim();if (!tline) continue;if (existingSet[tline]) continue;newItems.push(tline);}var newArray = parseInput(newItems.join('\n'));var combined = existing.slice();for (var i = 0;i < newArray.length;i++){if (combined.indexOf(newArray[i]) < 0) combined.push(newArray[i]);}if (newArray.length === 0 && newItems.length === 0){msgEl.textContent = "没有新数据！";msgEl.style.color = "red";return;}if (currentZone === 1){dataObj.backend1 = combined;}else{dataObj.backend2 = combined;}await saveDataToStorage();msgEl.textContent = "追加成功！新增 " + newArray.length + " 条，共 " + combined.length + " 条数据。";msgEl.style.color = "green";setTimeout(hideUpdateModal,2000);}</script>
</body>
</html>
