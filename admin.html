<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>后台管理</title><style>body{font-family:Arial;max-width:600px;margin:50px auto;padding:20px;text-align:center}h1{color:#333;font-size:24px;margin-bottom:30px}.ab{display:flex;justify-content:center;gap:50px;margin:60px 0}.ab button{padding:18px 40px;font-size:20px;background:#007bff;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:bold;box-shadow:0 4px 8px rgba(0,0,0,0.2)}.ab button:hover{background:#0056b3;transform:translateY(-2px);box-shadow:0 6px 12px rgba(0,0,0,0.3)}.o{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000}.m{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:30px;border-radius:8px;min-width:300px;max-width:90%}.m h2{margin-top:0;font-size:18px}.m textarea{width:100%;height:200px;margin:10px 0;padding:10px;font-size:14px;border:1px solid #ccc;border-radius:4px;box-sizing:border-box}.m input[type=password]{padding:8px;font-size:14px;width:200px;margin:10px 0;box-sizing:border-box}.m button{padding:8px 16px;font-size:14px;margin:5px;border:none;cursor:pointer;border-radius:4px}.m .v{background:#28a745;color:#fff}.m .x{background:#dc3545;color:#fff}.m .y{background:#007bff;color:#fff}.m .w{background:#ffc107;color:#000}.e{color:red;font-size:14px;margin-top:10px}@media(max-width:600px){body{margin:20px auto;padding:10px}.ab{flex-direction:column;gap:20px}.ab button{width:80%;margin:0 auto}.m{min-width:280px;padding:20px}}</style></head><body><div class="ab"><button onclick="sp(1)">管理1</button><button onclick="sp(2)">管理2</button></div><div id="a" class="o"><div class="m"><h2 id="pt">请输入密码</h2><input type="password" id="pi" placeholder="密码"/><br/><button class="y" onclick="cp()">确认</button><button class="x" onclick="hp()">取消</button><div id="pe" class="e"></div></div></div><div id="u" class="o"><div class="m"><h2 id="ut">更新数组数据</h2><p>请输入新的数组数据（每行一个编号，或用逗号分隔）：</p><textarea id="ai" placeholder=""></textarea><br/><button class="v" onclick="sv()">保存</button><button class="x" onclick="hu()">取消</button><button class="w" onclick="cl()">一键清除</button><div id="um" class="e"></div></div></div><script>var P1="\x62\x62\x62\x62\x62\x62\x62\x62",P2="\x6c\x6c\x6c\x6c\x6c\x6c\x6c\x6c",K=0x5a,z=0,D={f:[],b1:[],b2:[]};function X(s,k){var r="",i;for(i=0;i<s.length;i++)r+=String.fromCharCode(s.charCodeAt(i)^k);return r}var T1=X(P1,K),T2=X(P2,K);async function ld(){try{var r=await fetch("/api/data");if(r.ok)D=await r.json()}catch(e){}}async function svd(){await fetch("/api/data",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(D)})}ld();function sp(v){z=v;document.getElementById("a").style.display="block";document.getElementById("pt").textContent="Backend"+v+" - 请输入密码";document.getElementById("pi").value="";document.getElementById("pe").textContent="";document.getElementById("pi").focus()}function hp(){document.getElementById("a").style.display="none"}function cp(){var i=document.getElementById("pi").value,c=z===1?T1:T2;if(i===c){hp();uu()}else{document.getElementById("pe").textContent="密码错误！"}}document.getElementById("pi").addEventListener("keypress",function(e){if(e.key==="Enter")cp()});function uu(){document.getElementById("u").style.display="block";document.getElementById("ut").textContent="Backend"+z+" - 追加数据";var a=z===1?D.b1:D.b2;document.getElementById("ai").value=(a||[]).join("\n");document.getElementById("um").textContent="已有 "+(a||[]).length+" 条数据，在下面追加新数据";document.getElementById("um").style.color="#666"}function hu(){document.getElementById("u").style.display="none"}async function cl(){if(!confirm("确定要清除当前数组吗？"))return;document.getElementById("ai").value="";if(z===1){D.b1=[]}else{D.b2=[]}await svd();document.getElementById("um").textContent="已清除！";document.getElementById("um").style.color="green"}function O(input){if(!input.trim())return[];var idx=input.indexOf("厚"),res=[],lns=input.split("\n"),li,pi;for(li=0;li<lns.length;li++){var tl=lns[li].trim();if(!tl)continue;var it=tl.split(/[、\`,。,
]+/);for(pi=0;pi<it.length;pi++){var pt=it[pi].trim();if(!pt)continue;var nm=pt.match(/^([0-9A-Za-z]+)/);if(!nm)continue;var fi=input.indexOf(nm[1]);if(idx>=0&&fi>=0&&fi<idx)res.push(nm[1]+"-厚");else res.push(nm[1])}}var sn={},fn=[],ri;for(ri=0;ri<res.length;ri++){if(!sn[res[ri]]){sn[res[ri]]=true;fn.push(res[ri])}}return fn}async function sv(){var i=document.getElementById("ai").value,m=document.getElementById("um"),ex=z===1?(D.b1||[]):(D.b2||[]);if(!i.trim()){if(z===1){D.b1=[]}else{D.b2=[]}await svd();m.textContent="已保存（空数组）";m.style.color="green";setTimeout(hu,1500);return}var es={},e;for(e=0;e<ex.length;e++)es[ex[e]]=true;var ls=i.split("\n"),ni=[],li;for(li=0;li<ls.length;li++){var tl=ls[li].trim();if(!tl)continue;if(es[tl])continue;ni.push(tl)}var na=O(ni.join("\n")),cb=ex.slice(),j;for(j=0;j<na.length;j++){if(cb.indexOf(na[j])<0)cb.push(na[j])}if(na.length===0&&ni.length===0){m.textContent="没有新数据！";m.style.color="red";return}if(z===1){D.b1=cb}else{D.b2=cb}await svd();m.textContent="追加成功！新增 "+na.length+" 条，共 "+cb.length+" 条数据。";m.style.color="green";setTimeout(hu,2000)}</script></body></html>
